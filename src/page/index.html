<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>FRI ReferatBot Chat</title>

        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

        <style>
            :root {
                --fri-red: #da291c;
                --fri-red-dark: #b82217;
                --bg-color: #f0f2f5;
                --chat-bg: #ffffff;
                --text-main: #202124;
                --text-muted: #5f6368;
                --border-color: #e4e7eb;
                --msg-user: #da291c;
                --msg-user-text: #ffffff;
                --msg-bot: #f1f3f4;
                --msg-bot-text: #202124;
                --hover-bg: #f8f9fa;
            }

            [data-theme="dark"] {
                --bg-color: #1e1f22;
                --chat-bg: #2b2d31;
                --text-main: #dbdee1;
                --text-muted: #949ba4;
                --border-color: #3f4147;
                --msg-user: #da291c;
                --msg-bot: #383a40;
                --msg-bot-text: #dbdee1;
                --hover-bg: #35373c;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
                background-color: var(--bg-color);
                margin: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                color: var(--text-main);
                transition:
                    background-color 0.3s,
                    color 0.3s;
            }

            .chat-container {
                width: 100%;
                height: 100vh;
                max-width: 900px;
                background-color: var(--chat-bg);
                display: flex;
                flex-direction: column;
                box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
                transition: background-color 0.3s;
            }

            @media (min-width: 768px) {
                .chat-container {
                    height: 90vh;
                    border-radius: 12px;
                    overflow: hidden;
                }
            }

            .header {
                padding: 16px 24px;
                background-color: var(--chat-bg);
                border-bottom: 1px solid var(--border-color);
                display: flex;
                align-items: center;
                justify-content: space-between;
                z-index: 10;
                transition:
                    background-color 0.3s,
                    border-color 0.3s;
            }

            .header-left {
                display: flex;
                align-items: center;
                gap: 14px;
            }

            .header-logo {
                width: 36px;
                height: 36px;
                background-color: var(--msg-user);
                border-radius: 8px;
                display: flex;
                align-items: center;
                justify-content: center;
                color: white;
                font-weight: bold;
                letter-spacing: 1px;
            }

            .header-title {
                margin: 0;
                font-size: 1.1rem;
                font-weight: 600;
            }
            .header-subtitle {
                margin: 0;
                color: var(--text-muted);
                font-size: 0.8rem;
            }

            .theme-toggle-btn {
                background: none;
                border: none;
                color: var(--text-main);
                cursor: pointer;
                padding: 8px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                transition:
                    background-color 0.2s,
                    color 0.3s;
            }

            .theme-toggle-btn:hover {
                background-color: var(--hover-bg);
            }
            .theme-toggle-btn svg {
                width: 20px;
                height: 20px;
                fill: currentColor;
            }

            #chat {
                flex-grow: 1;
                padding: 24px;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                gap: 16px;
            }

            .empty-state {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100%;
                text-align: center;
                color: var(--text-muted);
                animation: fadeIn 0.5s ease;
            }

            .empty-state h3 {
                color: var(--text-main);
                margin-bottom: 8px;
            }

            .suggestions {
                display: flex;
                gap: 10px;
                margin-top: 20px;
                flex-wrap: wrap;
                justify-content: center;
            }

            .suggestion-btn {
                background-color: var(--bg-color);
                border: 1px solid var(--border-color);
                color: var(--text-main);
                padding: 8px 16px;
                border-radius: 16px;
                cursor: pointer;
                font-size: 0.9rem;
                transition:
                    background 0.2s,
                    border-color 0.3s,
                    color 0.3s;
            }

            .suggestion-btn:hover {
                background-color: var(--hover-bg);
            }

            .message-wrapper {
                display: flex;
                flex-direction: column;
                max-width: 85%;
                position: relative;
                animation: fadeIn 0.3s ease;
            }

            .message-wrapper.user {
                align-self: flex-end;
                align-items: flex-end;
            }
            .message-wrapper.assistant {
                align-self: flex-start;
                align-items: flex-start;
            }

            .message {
                padding: 12px 16px;
                line-height: 1.5;
                font-size: 0.95rem;
                word-wrap: break-word;
                transition:
                    background-color 0.3s,
                    color 0.3s,
                    border-color 0.3s;
            }

            .message p {
                margin: 0 0 8px 0;
            }
            .message p:last-child {
                margin: 0;
            }
            .message pre {
                background: rgba(0, 0, 0, 0.1);
                padding: 8px;
                border-radius: 4px;
                overflow-x: auto;
            }
            .message code {
                background: rgba(0, 0, 0, 0.1);
                padding: 2px 4px;
                border-radius: 4px;
                font-family: monospace;
            }

            .message-wrapper.user .message {
                background-color: var(--msg-user);
                color: var(--msg-user-text);
                border-radius: 18px 18px 4px 18px;
            }

            .message-wrapper.assistant .message {
                background-color: var(--msg-bot);
                color: var(--msg-bot-text);
                border-radius: 18px 18px 18px 4px;
                border: 1px solid var(--border-color);
            }

            .meta {
                font-size: 0.7rem;
                color: var(--text-muted);
                margin-top: 4px;
                padding: 0 4px;
            }

            /* --- STILI ZA TYPING INDICATOR IN DINAMIČNO BESEDILO --- */
            .typing-container {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .loading-text {
                font-size: 0.8rem;
                color: var(--text-muted);
                font-style: italic;
                opacity: 1;
                transition: opacity 0.3s ease-in-out;
                min-height: 1.2rem;
                margin-top: 4px;
            }

            .typing-indicator {
                display: flex;
                align-items: center;
                gap: 4px;
                padding: 4px 0;
            }
            .typing-indicator span {
                width: 6px;
                height: 6px;
                background-color: var(--text-muted);
                border-radius: 50%;
                animation: blink 1.4s infinite both;
            }
            .typing-indicator span:nth-child(1) {
                animation-delay: 0.2s;
            }
            .typing-indicator span:nth-child(2) {
                animation-delay: 0.4s;
            }
            .typing-indicator span:nth-child(3) {
                animation-delay: 0.6s;
            }

            @keyframes blink {
                0%,
                80%,
                100% {
                    opacity: 0.3;
                    transform: scale(0.8);
                }
                40% {
                    opacity: 1;
                    transform: scale(1.1);
                }
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .input-area {
                display: flex;
                padding: 16px 24px;
                background-color: var(--chat-bg);
                border-top: 1px solid var(--border-color);
                gap: 12px;
                align-items: flex-end;
                transition:
                    background-color 0.3s,
                    border-color 0.3s;
            }

            #input {
                flex-grow: 1;
                padding: 12px 16px;
                border: 1px solid var(--border-color);
                border-radius: 20px;
                resize: none;
                font-family: inherit;
                font-size: 0.95rem;
                background-color: var(--bg-color);
                color: var(--text-main);
                outline: none;
                line-height: 1.4;
                max-height: 120px;
                overflow-y: auto;
                transition:
                    background-color 0.3s,
                    border-color 0.2s,
                    color 0.3s;
            }

            #input:focus {
                border-color: var(--msg-user);
            }

            .send-btn {
                width: 44px;
                height: 44px;
                border-radius: 50%;
                background-color: var(--msg-user);
                color: white;
                border: none;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
                padding: 0;
                transition: background-color 0.2s;
            }

            .send-btn:hover {
                background-color: var(--fri-red-dark);
            }
            .send-btn svg {
                width: 18px;
                height: 18px;
                fill: none;
                stroke: currentColor;
                stroke-width: 2;
            }
        </style>
    </head>
    <body>
        <div class="chat-container">
            <div class="header">
                <div class="header-left">
                    <div class="header-logo">FRI</div>
                    <div>
                        <h2 class="header-title">ReferatBot</h2>
                        <p class="header-subtitle">AI Študentski Asistent</p>
                    </div>
                </div>

                <button
                    class="theme-toggle-btn"
                    onclick="toggleTheme()"
                    aria-label="Toggle Dark Mode"
                >
                    <svg id="theme-icon" viewBox="0 0 24 24">
                        <path
                            d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"
                        ></path>
                    </svg>
                </button>
            </div>

            <div id="chat"></div>

            <div class="input-area">
                <textarea
                    id="input"
                    rows="1"
                    placeholder="Postavi vprašanje..."
                    onkeydown="handleEnter(event)"
                ></textarea>
                <button
                    class="send-btn"
                    onclick="sendMessage()"
                    aria-label="Send Message"
                >
                    <svg viewBox="0 0 24 24">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>

        <script>
            // --- Dinamične nalagalne fraze ---
            let loadingPhrases = [];
            async function fetchMessages() {
                if (!loadingPhrases.length) {
                    const response = await fetch("/povedi.json");
                    loadingPhrases = await response.json();
                }
            }

            fetchMessages();
            let loadingInterval = null;
            let lastPhraseIndex = -1;

            function getRandomLoadingPhrase() {
                let newIndex = lastPhraseIndex;
                while (newIndex === lastPhraseIndex) {
                    newIndex = Math.floor(
                        Math.random() * loadingPhrases.length,
                    );
                }
                lastPhraseIndex = newIndex;
                return loadingPhrases[newIndex];
            }

            function startLoadingAnimation() {
                const el = document.getElementById("loading-text");
                if (!el) return;

                // Nastavi začetni tekst
                el.innerText = getRandomLoadingPhrase();

                // Interval vsake 3 sekunde (3000 ms)
                loadingInterval = setInterval(() => {
                    if (el) {
                        el.style.opacity = "0"; // Začni fade-out

                        setTimeout(() => {
                            el.innerText = getRandomLoadingPhrase();
                            el.style.opacity = "1"; // Fade-in novega teksta
                        }, 300); // 300ms počakamo, da se CSS tranzicija zaključi
                    }
                }, 3000);
            }

            function stopLoadingAnimation() {
                if (loadingInterval) {
                    clearInterval(loadingInterval);
                    loadingInterval = null;
                }
            }

            // --- Theme Management ---
            const themeIcon = document.getElementById("theme-icon");
            const sunPath =
                "M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41.39.39 1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41.39.39 1.03.39 1.41 0l1.06-1.06z";
            const moonPath =
                "M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z";

            function initTheme() {
                const savedTheme = localStorage.getItem("theme");
                if (savedTheme) {
                    document.documentElement.setAttribute(
                        "data-theme",
                        savedTheme,
                    );
                } else if (
                    window.matchMedia &&
                    window.matchMedia("(prefers-color-scheme: dark)").matches
                ) {
                    document.documentElement.setAttribute("data-theme", "dark");
                }
                updateThemeIcon();
            }

            function toggleTheme() {
                const currentTheme =
                    document.documentElement.getAttribute("data-theme");
                const newTheme = currentTheme === "dark" ? "light" : "dark";
                document.documentElement.setAttribute("data-theme", newTheme);
                localStorage.setItem("theme", newTheme);
                updateThemeIcon();
            }

            function updateThemeIcon() {
                const isDark =
                    document.documentElement.getAttribute("data-theme") ===
                    "dark";
                themeIcon.innerHTML = `<path d="${isDark ? sunPath : moonPath}"></path>`;
            }

            // --- Chat Management ---
            let messages = JSON.parse(localStorage.getItem("chat") || "[]");
            const chatEl = document.getElementById("chat");
            const inputEl = document.getElementById("input");
            let isAwaitingResponse = false;

            initTheme();
            inputEl.focus();
            render();

            inputEl.addEventListener("input", function () {
                this.style.height = "auto";
                this.style.height = Math.min(this.scrollHeight, 120) + "px";
            });

            function quickAsk(text) {
                inputEl.value = text;
                inputEl.style.height = "auto";
                sendMessage();
            }

            function handleEnter(e) {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            }

            function getTime() {
                return new Date().toLocaleTimeString([], {
                    hour: "2-digit",
                    minute: "2-digit",
                });
            }

            async function sendMessage() {
                let povedi = fetchMessages();
                const text = inputEl.value.trim();
                if (!text || isAwaitingResponse) return;

                messages.push({ role: "user", content: text, time: getTime() });
                inputEl.value = "";
                inputEl.style.height = "auto";

                await povedi;
                messages.push({ role: "assistant", isTyping: true });
                isAwaitingResponse = true;

                // Nariši z isTyping=true in sproži animacijo texta
                render(true);
                startLoadingAnimation();

                try {
                    const r = await fetch("/v1/chat/completions", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            model: "local",
                            messages: messages.filter((m) => !m.isTyping),
                        }),
                    });

                    const data = await r.json();
                    messages.pop(); // Remove typing indicator

                    const reply = data.choices[0].message.content;
                    messages.push({
                        role: "assistant",
                        content: reply,
                        time: getTime(),
                    });

                    localStorage.setItem("chat", JSON.stringify(messages));
                } catch (error) {
                    console.error("Backend connection error:", error);
                    messages.pop(); // Remove typing indicator
                    messages.push({
                        role: "assistant",
                        content:
                            "⚠️ Napaka pri povezavi s strežnikom. Preveri, če backend teče.",
                        time: getTime(),
                    });
                } finally {
                    stopLoadingAnimation();
                    isAwaitingResponse = false;
                    render(true);
                }
            }

            function render(forceScroll = false) {
                const isNearBottom =
                    chatEl.scrollHeight -
                        chatEl.scrollTop -
                        chatEl.clientHeight <
                    100;

                if (messages.length === 0) {
                    chatEl.innerHTML = `
                    <div class="empty-state">
                        <h3>👋 Pozdravljeni!</h3>
                        <p>Zastavite vprašanje o študiju, pravilih ali predmetniku na FRI.</p>
                        <div class="suggestions">
                            <button class="suggestion-btn" onclick="quickAsk('Kdaj so izpiti?')">Kdaj so izpiti?</button>
                            <button class="suggestion-btn" onclick="quickAsk('Kako deluje vpis v višji letnik?')">Pogoji za vpis?</button>
                            <button class="suggestion-btn" onclick="quickAsk('Kolikokrat lahko ponavljam izpit?')">Kolikokrat lahko ponavljam izpit?</button>
                        </div>
                    </div>
                `;
                    return;
                }

                chatEl.innerHTML = messages
                    .map((m) => {
                        // Izris za čas čakanja na odgovor s tekstom spodaj
                        if (m.isTyping) {
                            return `
                        <div class="message-wrapper assistant">
                            <div class="message">
                                <div class="typing-container">
                                    <div class="typing-indicator"><span></span><span></span><span></span></div>
                                    <div id="loading-text" class="loading-text">Nalagam...</div>
                                </div>
                            </div>
                        </div>
                    `;
                        }

                        const rawHTML = marked.parse(m.content);
                        const cleanHTML = DOMPurify.sanitize(rawHTML);
                        const timeStr = m.time || "";

                        return `
                    <div class="message-wrapper ${m.role}">
                        <div class="message">${cleanHTML}</div>
                        <div class="meta">${timeStr}</div>
                    </div>
                `;
                    })
                    .join("");

                if (forceScroll || isNearBottom) {
                    chatEl.scrollTop = chatEl.scrollHeight;
                }
            }
        </script>
    </body>
</html>
